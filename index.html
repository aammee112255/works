<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意色彩作業：像素吞噬者 V2 (Color Merge IO)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0f1d;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            font-size: 1.3rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .score-box { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .color-box { display: flex; align-items: center; gap: 10px; color: #ffffff; }
        #color-preview {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid white; display: inline-block;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        #canvas-container {
            position: relative;
            border: 3px solid #1a1f38;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
            background-color: #060814;
        }
        canvas {
            display: block;
            border-radius: 9px;
            cursor: none; 
        }

        /* 結束面板 */
        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 26, 0.9);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 20;
        }
        #game-over-screen.show { opacity: 1; pointer-events: auto; }
        h1 {
            font-size: 3.5rem; margin: 0;
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #a0a5c0; font-size: 1.2rem; margin: 15px 0 30px 0; }
        
        #restart-btn {
            padding: 14px 40px; font-size: 1.2rem; font-weight: bold;
            color: white; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #00ffcc, #0077ff);
            cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,204,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,255,204,0.5);
        }
        #tip { margin-top: 15px; color: #4e5578; font-size: 0.95rem; text-align: center; max-width: 600px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="score-box">SIZE / SCORE: <span id="score-val">15</span></div>
    <div class="color-box">目前特徵色：<span id="color-preview"></span></div>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    
    <div id="game-over-screen">
        <h1>你被吞噬了！</h1>
        <p>最終演化體型（得分）：<span id="final-score" style="color:#00ffcc; font-weight:bold;">0</span></p>
        <button id="restart-btn" onclick="resetGame()">重新繁衍 ➔</button>
    </div>
</div>

<div id="tip">💡 修正優化版：修正了後期大球卡在邊緣的問題！吃碎片改變顏色，追擊弱小者，小心避開危險的巨大相斥異色球。</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let isGameOver = false;
    let score = 15; // 初始體型半徑

    // 1. 玩家定義
    let player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: 15,
        color: { r: 100, g: 200, b: 255 }
    };

    // 遊戲元件陣列
    let foods = [];
    let enemies = [];
    const maxFoods = 60;
    const maxEnemies = 8;

    // 滑鼠游標位置
    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    // 輔助函式：將 RGB 物件轉成 CSS 顏色格式
    function getRGBString(rgbObj) {
        return `rgb(${Math.floor(rgbObj.r)}, ${Math.floor(rgbObj.g)}, ${Math.floor(rgbObj.b)})`;
    }

    // 計算兩個顏色的相似度
    function getColorDistance(c1, c2) {
        let dr = c1.r - c2.r;
        let dg = c1.g - c2.g;
        let db = c1.b - c2.b;
        return Math.sqrt(dr*dr + dg*dg + db*db);
    }

    // 2. 食物碎片類別
    class Food {
        constructor() {
            this.spawn();
        }
        spawn() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.r = Math.random() * 3 + 3;
            const seed = Math.random();
            if (seed < 0.33) this.color = { r: 255, g: 50, b: 50 };      // 紅
            else if (seed < 0.66) this.color = { r: 50, g: 255, b: 50 }; // 綠
            else this.color = { r: 50, g: 50, b: 255 };                  // 藍
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = getRGBString(this.color);
            ctx.fill();
        }
    }

    // 3. AI 敵對大色球類別
    class Enemy {
        constructor() {
            this.reset();
        }
        reset() {
            // 從更遠的外圍隨機誕生，避免直接誕生在死角
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.max(canvas.width, canvas.height) / 2 + 100;
            this.x = canvas.width / 2 + Math.cos(angle) * distance;
            this.y = canvas.height / 2 + Math.sin(angle) * distance;
            
            // 根據玩家目前的體型動態調整生成大小，避免無限膨脹
            this.r = Math.random() * 15 + Math.max(10, player.r * 0.6);
            if (this.r > 120) this.r = 120; // 【修正】限制電腦球最大半徑，防止塞滿螢幕

            this.color = {
                r: Math.random() * 255,
                g: Math.random() * 255,
                b: Math.random() * 255
            };
            this.speed = Math.random() * 0.6 + 0.6;
            
            // 給予初始隨機巡邏向量
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
        }
        update() {
            let dx = player.x - this.x;
            let dy = player.y - this.y;
            let dist = Math.hypot(dx, dy);
            let colorDist = getColorDistance(this.color, player.color);
            
            let isDangerousToPlayer = (this.r > player.r) && (colorDist > 120); 
            let isWeakToPlayer = (this.r < player.r) || (colorDist <= 120);

            let angle = Math.atan2(dy, dx);

            if (isDangerousToPlayer && dist < 300) {
                // 追擊玩家
                this.vx = Math.cos(angle) * this.speed * 1.4;
                this.vy = Math.sin(angle) * this.speed * 1.4;
            } 
            else if (isWeakToPlayer && dist < 180) {
                // 逃離玩家
                this.vx = -Math.cos(angle) * this.speed * 1.2;
                this.vy = -Math.sin(angle) * this.speed * 1.2;
            }
            else {
                // 隨機漫步，保持原本動量，避免卡在牆角不動
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
                
                let s = Math.hypot(this.vx, this.vy);
                if (s > this.speed) {
                    this.vx = (this.vx / s) * this.speed;
                    this.vy = (this.vy / s) * this.speed;
                }
            }

            // 更新位置
            this.x += this.vx;
            this.y += this.vy;

            // 【重大修正 A：動態邊緣出界檢查】
            // 加上自身半徑作為緩衝，確保整顆大球完全離開視野才重置
            let buffer = this.r + 60;
            if (this.x < -buffer || this.x > canvas.width + buffer || this.y < -buffer || this.y > canvas.height + buffer) {
                this.reset();
            }

            // 【重大修正 B：貼牆反彈與向心推力】
            // 如果巨大的球觸碰到螢幕邊緣，施加一個拉回中心的推力，防止與牆面摩擦卡死
            if (this.x < this.r) this.vx += 0.05;
            if (this.x > canvas.width - this.r) this.vx -= 0.05;
            if (this.y < this.r) this.vy += 0.05;
            if (this.y > canvas.height - this.r) this.vy -= 0.05;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = getRGBString(this.color);
            ctx.fill();
            
            let colorDist = getColorDistance(this.color, player.color);
            ctx.strokeStyle = (this.r > player.r && colorDist > 120) ? '#ff3333' : '#33ff33';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }

    // 初始化遊戲物件
    function init() {
        foods = [];
        enemies = [];
        for (let i = 0; i < maxFoods; i++) foods.push(new Food());
        for (let i = 0; i < maxEnemies; i++) enemies.push(new Enemy());
        updateUI();
    }

    function updateUI() {
        document.getElementById('score-val').innerText = Math.floor(player.r);
        document.getElementById('color-preview').style.backgroundColor = getRGBString(player.color);
    }

    // 4. 核心遊戲主循環
    function gameLoop() {
        if (isGameOver) return;

        ctx.fillStyle = '#060814';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        // 更新玩家位置
        let targetX = mouse.x;
        let targetY = mouse.y;
        player.x += (targetX - player.x) * 0.08;
        player.y += (targetY - player.y) * 0.08;

        player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
        player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

        // 繪製玩家
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fillStyle = getRGBString(player.color);
        ctx.shadowBlur = player.r * 0.5;
        ctx.shadowColor = getRGBString(player.color);
        ctx.fill();
        ctx.shadowBlur = 0; 

        // 處理食物碎片
        for (let i = foods.length - 1; i >= 0; i--) {
            foods[i].draw();

            let dist = Math.hypot(player.x - foods[i].x, player.y - foods[i].y);
            if (dist < player.r + foods[i].r) {
                player.r += 0.2; 
                // 限制玩家最大體型半徑為 100，避免爆出螢幕
                if(player.r > 100) player.r = 100;

                player.color.r = player.color.r * 0.98 + foods[i].color.r * 0.02;
                player.color.g = player.color.g * 0.98 + foods[i].color.g * 0.02;
                player.color.b = player.color.b * 0.98 + foods[i].color.b * 0.02;

                foods.splice(i, 1);
                foods.push(new Food()); 
                updateUI();
            }
        }

        // 處理 AI 敵對球
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.update();
            e.draw();

            let dist = Math.hypot(player.x - e.x, player.y - e.y);
            if (dist < player.r + e.r - 3) { 
                let colorDist = getColorDistance(player.color, e.color);

                if (colorDist <= 120 || player.r > e.r) {
                    player.r += e.r * 0.15;
                    if(player.r > 100) player.r = 100;

                    player.color.r = player.color.r * 0.7 + e.color.r * 0.3;
                    player.color.g = player.color.g * 0.7 + e.color.g * 0.3;
                    player.color.b = player.color.b * 0.7 + e.color.b * 0.3;
                    
                    enemies.splice(i, 1);
                    let newEnemy = new Enemy();
                    enemies.push(newEnemy);
                    updateUI();
                } 
                else {
                    endGame();
                }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function drawGrid() {
        ctx.strokeStyle = '#11152c';
        ctx.lineWidth = 1;
        const gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    function endGame() {
        isGameOver = true;
        document.getElementById('final-score').innerText = Math.floor(player.r);
        document.getElementById('game-over-screen').classList.add('show');
    }

    function resetGame() {
        isGameOver = false;
        player.r = 15;
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        player.color = { r: Math.random() * 255, g: Math.random() * 255, b: Math.random() * 255 };
        document.getElementById('game-over-screen').classList.remove('show');
        init();
        gameLoop();
    }

    init();
    gameLoop();
</script>

</body>
</html>
