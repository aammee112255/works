<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意幾何作業：霓虹引力捕手 (Neon Gravity)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a12;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            pointer-events: none; /* 讓字體不影響滑鼠點擊 */
            z-index: 10;
        }
        .score-box { color: #00f260; text-shadow: 0 0 10px rgba(0,242,96,0.5); }
        .hp-box { color: #ff3366; text-shadow: 0 0 10px rgba(255,51,102,0.5); }
        
        #canvas-container {
            position: relative;
            border: 2px solid #1e1e38;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.15);
            background-color: #020208;
        }
        canvas {
            display: block;
            border-radius: 14px;
            cursor: crosshair;
        }

        /* 遊戲結束蓋板 */
        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 20;
        }
        #game-over-screen.show {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #ff3366, #ff00a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #8a8ab0; margin-bottom: 25px; font-size: 1.1rem; }
        
        #restart-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #00f260, #0575e6);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,242,96,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,242,96,0.5);
        }
        #instruction {
            margin-top: 15px;
            color: #5f5f85;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="score-box">SCORE: <span id="score-val">0</span></div>
    <div class="hp-box">HP: <span id="hp-val">5</span></div>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="550"></canvas>
    
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p>你的重力核心已過載。最終得分：<span id="final-score" style="color:#00f260; font-weight:bold;">0</span></p>
        <button id="restart-btn" onclick="resetGame()">重啟核心 ➔</button>
    </div>
</div>

<div id="instruction">💡 操作說明：在畫面中【按住滑鼠左鍵】不放，可製造黑洞重力場引導小球進入中央核心！</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 遊戲運行核心變數
    let score = 0;
    let hp = 5;
    let isGameOver = false;
    let particles = [];
    let spawnTimer = 0;
    let spawnRate = 60; // 每隔幾幀生成一顆球 (越低越快)

    // 滑鼠與重力場狀態
    let mouse = { x: 0, y: 0, isDown: false };
    const gravitySource = { x: canvas.width / 2, y: canvas.height / 2, radius: 25 };

    // 監聽滑鼠動作
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    canvas.addEventListener('mousedown', () => mouse.isDown = true);
    canvas.addEventListener('mouseup', () => mouse.isDown = false);
    canvas.addEventListener('mouseleave', () => mouse.isDown = false);

    // 粒子類別 (定義每一顆飛入的小球)
    class Particle {
        constructor() {
            // 隨機從螢幕四個邊界之外生成
            if (Math.random() > 0.5) {
                this.x = Math.random() > 0.5 ? -20 : canvas.width + 20;
                this.y = Math.random() * canvas.height;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() > 0.5 ? -20 : canvas.height + 20;
            }

            // 給予衝向中央附近的初速度
            const angle = Math.atan2(canvas.height/2 - this.y, canvas.width/2 - this.x) + (Math.random() - 0.5) * 0.5;
            const speed = Math.random() * 2 + 1.5;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;

            this.radius = Math.random() * 4 + 5; // 半徑 5~9
            // 隨機賦予螢光色彩
            const colors = ['#00f260', '#00d2ff', '#ff00a0', '#ffdd67', '#9933ff'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            // 如果玩家滑鼠按住，就對小球施加朝向滑鼠位置的重力加速度
            if (mouse.isDown) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 10) {
                    // 物理模擬：萬有引力公式原理（引力強度與距離成反比）
                    const gravityStrength = 150 / (distance); 
                    this.vx += (dx / distance) * gravityStrength;
                    this.vy += (dy / distance) * gravityStrength;
                }
            }

            // 更新位置
            this.x += this.vx;
            this.y += this.vy;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            // 製作漂亮的發光霓虹特效 (利用 Canvas 原生陰影)
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0; // 重設陰影，避免影響其他繪圖性能
        }
    }

    // 核心主循環 (每秒執行約 60 次)
    function gameLoop() {
        if (isGameOver) return;

        // 1. 清空畫布，並留下一點點黑底尾跡（製造殘影流光感）
        ctx.fillStyle = 'rgba(2, 2, 8, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 繪製中央收集器核心
        drawCenterCore();

        // 3. 繪製滑鼠重力場範圍效果
        if (mouse.isDown) {
            drawGravityField();
        }

        // 4. 定時生成新的小球
        spawnTimer++;
        if (spawnTimer >= spawnRate) {
            particles.push(new Particle());
            spawnTimer = 0;
            // 隨著分數變高，生球速度會稍微加快，增加難度
            if (spawnRate > 25 && score % 5 === 0) spawnRate -= 1;
        }

        // 5. 更新並繪製所有小球
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();

            // 判斷條件 A：小球是否被中央核心成功捕捉
            const distToCore = Math.hypot(gravitySource.x - p.x, gravitySource.y - p.y);
            if (distToCore < gravitySource.radius + p.radius) {
                particles.splice(i, 1);
                score += 10;
                document.getElementById('score-val').innerText = score;
                continue;
            }

            // 判斷條件 B：小球是否飛出螢幕邊界外（漏接）
            if (p.x < -40 || p.x > canvas.width + 40 || p.y < -40 || p.y > canvas.height + 40) {
                particles.splice(i, 1);
                hp -= 1;
                document.getElementById('hp-val').innerText = hp;

                if (hp <= 0) {
                    endGame();
                }
            }
        }

        // 循環執行
        requestAnimationFrame(gameLoop);
    }

    // 繪製中央核心
    function drawCenterCore() {
        ctx.beginPath();
        ctx.arc(gravitySource.x, gravitySource.y, gravitySource.radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#00f260';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f260';
        ctx.stroke();

        // 內圈實心
        ctx.beginPath();
        ctx.arc(gravitySource.x, gravitySource.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // 繪製滑鼠按住時的波紋引力圈
    function drawGravityField() {
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 60, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 210, 255, 0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]); // 虛線效果
        ctx.stroke();
        ctx.setLineDash([]); // 還原實線

        // 滑鼠中心的黑洞聚焦點
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#00d2ff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00d2ff';
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // 遊戲結束
    function endGame() {
        isGameOver = true;
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').classList.add('show');
    }

    // 重新開始遊戲
    function resetGame() {
        score = 0;
        hp = 5;
        spawnRate = 60;
        particles = [];
        isGameOver = false;
        document.getElementById('score-val').innerText = score;
        document.getElementById('hp-val').innerText = hp;
        document.getElementById('game-over-screen').classList.remove('show');
        gameLoop();
    }

    // 啟動遊戲
    gameLoop();
</script>

</body>
</html>
