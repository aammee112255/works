<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極寒サバイバル！数字を増やして北極熊を倒せ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #e0f2fe, #7dd3fc);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #0369a1;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px white;
        }

        #subtitle {
            color: #0c4a6e;
            margin-top: 0;
            font-weight: bold;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 550px;
            background: rgba(255, 255, 255, 0.6);
            border: 4px solid #0284c7;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* キャラクター共通スタイル */
        .character {
            position: absolute;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* レベルバッジ */
        .level-badge {
            background-color: #ef4444;
            color: white;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* プレイヤー固有 */
        #player .level-badge {
            background-color: #3b82f6; /* プレイヤーは青 */
        }

        .sprite {
            font-size: 45px;
            user-select: none;
        }

        /* メッセージ表示 */
        #message {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1e3a8a;
            pointer-events: none;
            z-index: 10;
        }

        /* リスタートボタン */
        #restart-btn {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            font-size: 18px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 20;
        }

        #restart-btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <h1>寒霜啓示録風ミニゲーム</h1>
    <p id="subtitle">自分よりレベルの低い熊（🐻‍❄️）をタップして倒せ！</p>

    <div id="game-container">
        <div id="message"></div>
        <button id="restart-btn" onclick="initGame()">もう一度挑戦</button>
        
        <div id="player" class="character">
            <div class="level-badge" id="player-level">LV 5</div>
            <div class="sprite">🥶</div>
        </div>

        <div id="enemies-layer"></div>
    </div>

<script>
    let playerLevel = 5;
    const initialPlayerLevel = 5;
    const gameContainer = document.getElementById('game-container');
    const playerEl = document.getElementById('player');
    const playerLevelEl = document.getElementById('player-level');
    const enemiesLayer = document.getElementById('enemies-layer');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restart-btn');

    // 敵データ（初期位置とレベルの倍率）
    const enemyConfig = [
        { id: 1, x: 50,  y: 100, levelOffset: -3, sprite: '🐻‍❄️' },  // 弱い熊
        { id: 2, x: 280, y: 120, levelOffset: 2,  sprite: '🐻‍❄️' },  // ちょっと強い熊
        { id: 3, x: 80,  y: 280, levelOffset: 8,  sprite: '🐻‍❄️' },  // 強い熊
        { id: 4, x: 260, y: 320, levelOffset: 18, sprite: '👑' },   // ボス（氷の王冠）
    ];

    function initGame() {
        // 初期化
        playerLevel = initialPlayerLevel;
        updatePlayer();
        playerEl.style.left = '170px';
        playerEl.style.top = '440px';
        playerEl.style.display = 'flex';
        
        messageEl.innerText = 'ターゲットを選べ！';
        restartBtn.style.display = 'none';
        enemiesLayer.innerHTML = '';

        // 敵の生成
        enemyConfig.forEach(conf => {
            const enemy = document.createElement('div');
            enemy.className = 'character enemy';
            enemy.style.left = conf.x + 'px';
            enemy.style.top = conf.y + 'px';
            
            // 広告っぽく、プレイヤーの初期レベルを基準に手頃な強さを設定
            const targetLevel = initialPlayerLevel + conf.levelOffset;

            enemy.innerHTML = `
                <div class="level-badge">LV ${targetLevel}</div>
                <div class="sprite">${conf.sprite}</div>
            `;

            // クリックイベント
            enemy.onclick = () => attackEnemy(enemy, targetLevel);
            enemiesLayer.appendChild(enemy);
        });
    }

    function updatePlayer() {
        playerLevelEl.innerText = `LV ${playerLevel}`;
    }

    function attackEnemy(enemyEl, enemyLevel) {
        if (playerLevel > enemyLevel) {
            // 勝利：プレイヤーが移動して敵を吸収
            playerEl.style.left = enemyEl.style.left;
            playerEl.style.top = enemyEl.style.top;
            
            // レベルアップ！
            playerLevel += enemyLevel;
            updatePlayer();
            
            // 敵を消去
            enemyEl.remove();
            messageEl.innerText = '撃破！レベルアップ！';

            // クリア判定（敵が全滅したか）
            setTimeout(() => {
                if (document.querySelectorAll('.enemy').length === 0) {
                    messageEl.innerText = '🎉 ステージクリア！ 🎉';
                    restartBtn.style.display = 'block';
                }
            }, 300);

        } else {
            // 敗北：広告でよく見るお約束のゲームオーバー
            messageEl.innerText = '❌ 失敗！熊に負けました…';
            playerEl.style.display = 'none';
            restartBtn.style.display = 'block';
        }
    }

    // ゲーム開始
    initGame();
</script>

</body>
</html>
