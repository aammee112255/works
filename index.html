<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚兒數字填色</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
}

#board{
    display:grid;
    grid-template-columns:repeat(10,40px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:40px;
    height:40px;
    background:white;
    border:1px solid #ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
}

.palette button{
    margin:5px;
    padding:10px 15px;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🐟 魚兒數字填色</h1>
<h2 id="levelText"></h2>

<div class="palette" id="palette"></div>

<p>目前選擇：
<span id="currentColor">無</span>
</p>

<div id="board"></div>

<h2 id="message"></h2>

<script>

const colors = {
    1:"#ff595e",
    2:"#ffca3a",
    3:"#8ac926",
    4:"#1982c4",
    5:"#6a4c93"
};

let currentLevel = 0;
let selectedColor = null;

/* 建立魚圖案 */
function createFish(pattern){

    const grid = [];

    for(let r=0;r<10;r++){
        grid[r]=[];

        for(let c=0;c<10;c++){
            grid[r][c]=0;
        }
    }

    /* 魚身 */
    for(let r=2;r<=7;r++){

        for(let c=2;c<=7;c++){

            grid[r][c]=((c-2+pattern)%5)+1;
        }
    }

    /* 尾巴 */
    grid[3][0]=2;
    grid[4][1]=1;
    grid[5][1]=1;
    grid[6][0]=2;

    /* 魚嘴 */
    grid[4][8]=3;
    grid[5][8]=3;
    grid[3][9]=4;
    grid[6][9]=4;

    return grid;
}

/* 10關 */
const levels=[];

for(let i=0;i<10;i++){

    levels.push(createFish(i));
}

function createPalette(){

    const palette =
    document.getElementById("palette");

    for(let num in colors){

        const btn =
        document.createElement("button");

        btn.style.background=
        colors[num];

        btn.textContent=
        num+"號";

        btn.onclick=()=>{

            selectedColor =
            Number(num);

            document.getElementById(
            "currentColor"
            ).textContent=
            num+"號";
        };

        palette.appendChild(btn);
    }
}

function loadLevel(){

    document.getElementById(
    "levelText"
    ).textContent=
    `第 ${currentLevel+1} 關 / 10`;

    document.getElementById(
    "message"
    ).textContent="";

    const board =
    document.getElementById("board");

    board.innerHTML="";

    const grid =
    levels[currentLevel];

    for(let r=0;r<10;r++){

        for(let c=0;c<10;c++){

            const value=
            grid[r][c];

            const cell=
            document.createElement("div");

            cell.className="cell";

            if(value===0){

                cell.style.visibility=
                "hidden";

            }else{

                cell.textContent=
                value;

                cell.dataset.answer=
                value;

                cell.onclick=
                ()=>paint(cell);
            }

            board.appendChild(cell);
        }
    }
}

function paint(cell){

    if(selectedColor===null)
    return;

    const answer =
    Number(cell.dataset.answer);

    if(answer===selectedColor){

        cell.style.background=
        colors[selectedColor];

        cell.textContent="";

        cell.dataset.done="1";

        checkWin();
    }
}

function checkWin(){

    const cells=
    document.querySelectorAll(
    ".cell[data-answer]"
    );

    for(let cell of cells){

        if(cell.dataset.done!=="1")
        return;
    }

    document.getElementById(
    "message"
    ).textContent=
    "🎉 恭喜過關！";

    setTimeout(()=>{

        currentLevel++;

        if(currentLevel>=10){

            currentLevel=0;
        }

        loadLevel();

    },1500);
}

createPalette();
loadLevel();

</script>

</body>
</html>
